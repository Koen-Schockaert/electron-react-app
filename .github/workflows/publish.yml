name: Build and Release

on:
  push:
    #branches:
    #  - main
    #  - beta
    #  - alpha
    tags:
      - 'v*'
      
permissions:
  contents: write
  packages: write

jobs:
  build:
    if: ${{ github.repository_owner == 'Koen-Schockaert' }}

    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Package Electron app (create artifacts)
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "Packaging with version $VERSION"
          npx electron-builder --publish=never --config.extraMetadata.version=$VERSION

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-build-${{ matrix.os }}
          path: release/build/**

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release/build/

      - name: Show downloaded files
        run: ls -la release/build || true

      - name: Compute release tag
        id: tag
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "TAG=v$VERSION" >> $GITHUB_ENV

      - name: Create or update GitHub Release and upload assets
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ env.TAG }}
          files: release/build/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
