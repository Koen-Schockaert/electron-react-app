name: Publish

on:
  push:
    branches:
      - main
      #- beta
      #- alpha

jobs:
  publish:
    if: ${{ github.repository_owner == 'koen-schockaert' }}

    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [macos-latest]

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout git repo
        uses: actions/checkout@v5

      - name: Install Node and NPM
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install and build
        run: |
          npm install
          npm run postinstall
          npm run build

      - name: Publish releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm exec electron-builder -- --publish always --win --mac --linux

