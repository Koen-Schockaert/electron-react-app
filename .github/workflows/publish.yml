name: Build and Release 2

on:
  push:
    #branches:
    #  - main
    #  - beta
    #  - alpha
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build:
    if: ${{ github.repository_owner == 'Koen-Schockaert' }}

    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build app
        run: npm run build

      - name: Build & publish Electron app (sync version + force)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # ensure release/app/package.json matches root version (optional but recommended)
          if [ -f release/app/package.json ]; then
            node -e "const fs=require('fs');const r=JSON.parse(fs.readFileSync('package.json'));const p='release/app/package.json';let a=JSON.parse(fs.readFileSync(p));if(a.version!==r.version){a.version=r.version;fs.writeFileSync(p,JSON.stringify(a,null,2)+'\n');console.log('Synced',p,'->',r.version);}else{console.log('Already in sync');}"
          fi
          # force electron-builder to use root package.json version
          npx electron-builder --publish always --config.extraMetadata.version=$(node -p "require('./package.json').version")

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-build-${{ matrix.os }}
          path: |
            dist/**
            release/**
            out/**
