name: Build and Release

on:
  push:
    #branches:
    #  - main
    #  - beta
    #  - alpha
    tags:
      - 'v*'
      
permissions:
  contents: write
  packages: write

jobs:
  build:
    if: ${{ github.repository_owner == 'Koen-Schockaert' }}

    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Package Electron app (create artifacts)
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "Packaging with version $VERSION"
          npx electron-builder --publish=never --config.extraMetadata.version=$VERSION

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-build-${{ matrix.os }}
          path: release/build/**

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release/build/

      - name: Show downloaded files
        run: ls -la release/build || true

      - name: Compute release tag
        id: tag
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "TAG=v$VERSION" >> $GITHUB_ENV

      - name: Create or update GitHub Release and upload assets
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ env.TAG }}
          release_name: ${{ env.TAG }}
          body: "Automated release for ${{ env.TAG }}"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release assets (recursive)
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # get upload URL from create-release output and remove the template part "{?name,label}"
          upload_url_raw="${{ steps.create_release.outputs.upload_url }}"
          upload_url="${upload_url_raw%\{*}"
          if [ -z "$upload_url" ]; then
            echo "No upload_url from create-release; aborting."
            exit 1
          fi
          echo "Base upload URL: $upload_url"

          shopt -s globstar nullglob
          files=(release/build/**/*)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No files found to upload"
            exit 0
          fi

          for f in "${files[@]}"; do
            [ -f "$f" ] || continue
            name=$(basename "$f")
            echo "Uploading $f as $name"
            # use multipart/form-data upload (curl -F) so GitHub accepts the asset
            curl -sS -X POST \
              -H "Authorization: token $GITHUB_TOKEN" \
              -F "file=@${f}" \
              "${upload_url}?name=${name}"
            status=$?
            if [ $status -ne 0 ]; then
              echo "Upload failed for $name (curl exit $status)"
              exit $status
            fi
          done
