name: Release

on:
  push:
    branches:
      - main
      - alpha
      - beta

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Get version (fallback to package.json)
        shell: bash
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v$(node -p \"require('./package.json').version\")")
          VERSION=${TAG#v}
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Using tag: $TAG / version: $VERSION"

      - name: Clean previous builds
        shell: bash
        run: rm -rf release/build/* || true

      - name: Build app
        run: npm run build

      - name: Package Electron app
        shell: bash
        run: |
          echo "Packaging app with version $VERSION"
          npm run package -- --config.extraMetadata.version=$VERSION

      - name: Debug: list release/build
        if: always()
        run: |
          echo "Listing release/build contents for ${RUNNER_OS}"
          ls -la release/build || true

      - name: Upload platform artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: release/build/*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release/build/

      - name: Show downloaded files
        run: ls -la release/build || true

      - name: Ensure TAG env (fallback to package.json)
        shell: bash
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v$(node -p \"require('./package.json').version\")")
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "Using TAG=$TAG"

      - name: Create GitHub Release and upload assets
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ env.TAG }}
          files: release/build/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
